name: ✨ 功能请求 (中文)
description: 建议一个新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 你遇到了什么问题？这个功能要解决什么需求？
      placeholder: 例如：我在使用时总是需要...，但目前很不方便
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何解决这个问题？
      placeholder: 描述你期望的功能或改进
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过其他解决方案吗？
      placeholder: 描述你考虑过的其他方案

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何有助于理解这个功能请求的信息
      placeholder: 可以添加截图、示例、参考链接等
