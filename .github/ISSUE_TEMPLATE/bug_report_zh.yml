name: 🐛 Bug 报告 (中文)
description: 报告一个 Bug 帮助我们改进
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这个 Bug 报告！

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 Bug
      placeholder: 告诉我们发生了什么问题
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 打开 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: 描述你期望的正确行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 描述实际观察到的行为
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 操作系统
      description: 你在哪个平台上遇到这个问题？
      options:
        - Windows
        - macOS
        - Linux
        - 其他
      multiple: true
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本
      description: 你使用的 MarkText Plus 版本是？
      placeholder: 例如 v1.0.2
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或日志
      description: 如果适用，添加截图或错误日志帮助解释问题
      placeholder: 拖拽图片到这里或粘贴日志

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他任何有助于解决问题的信息
